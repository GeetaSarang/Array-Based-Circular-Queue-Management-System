<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Desk Dashboard - Circular Queue Management</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1 class="title">
                    <span class="neon-text">SERVICE DESK</span> 
                    <span class="subtitle">Queue Management System</span>
                </h1>
                <div class="status-indicators">
                    <div class="indicator">
                        <span class="indicator-label">Status:</span>
                        <span id="system-status" class="status-active">ACTIVE</span>
                    </div>
                    <div class="indicator">
                        <span class="indicator-label">Capacity:</span>
                        <span id="capacity-display">0/10</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Queue Visualization -->
            <section class="queue-section">
                <div class="section-header">
                    <h2>Queue Visualization</h2>
                    <div class="queue-info">
                        <div class="pointer-info">
                            <div class="pointer front-pointer">
                                <span class="pointer-label">FRONT</span>
                                <div class="pointer-arrow">→</div>
                            </div>
                            <div class="pointer rear-pointer">
                                <span class="pointer-label">REAR</span>
                                <div class="pointer-arrow">→</div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="queue-container">
                    <div class="queue-array" id="queue-array">
                        <!-- Queue slots will be generated by JavaScript -->
                    </div>
                </div>

                <div class="queue-legend">
                    <div class="legend-item">
                        <div class="legend-color empty-slot"></div>
                        <span>Empty Slot</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color occupied-slot"></div>
                        <span>Occupied Slot</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color front-indicator"></div>
                        <span>Front Position</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color rear-indicator"></div>
                        <span>Rear Position</span>
                    </div>
                </div>
            </section>

            <!-- Control Panel -->
            <section class="control-section">
                <div class="section-header">
                    <h2>Control Panel</h2>
                </div>
                
                <div class="controls">
                    <div class="input-group">
                        <label for="customer-input">Customer Number:</label>
                        <input type="number" id="customer-input" placeholder="Enter customer ID" min="1" max="999">
                        <button id="enqueue-btn" class="btn btn-primary">
                            <span class="btn-icon">+</span> Enqueue Customer
                        </button>
                    </div>
                    
                    <div class="action-buttons">
                        <button id="dequeue-btn" class="btn btn-secondary">
                            <span class="btn-icon">-</span> Dequeue Customer
                        </button>
                        <button id="peek-btn" class="btn btn-info">
                            <span class="btn-icon">👁</span> Peek Front
                        </button>
                        <button id="clear-btn" class="btn btn-danger">
                            <span class="btn-icon">✕</span> Clear Queue
                        </button>
                    </div>
                    
                    <div class="status-buttons">
                        <button id="check-empty-btn" class="btn btn-outline">Check Empty</button>
                        <button id="check-full-btn" class="btn btn-outline">Check Full</button>
                    </div>
                </div>
            </section>
        </main>

        <!-- Logs Panel -->
        <aside class="logs-panel">
            <div class="section-header">
                <h2>Activity Logs</h2>
                <button id="clear-logs-btn" class="btn btn-small">Clear Logs</button>
            </div>
            
            <div class="logs-container" id="logs-container">
                <div class="log-entry log-info">
                    <span class="log-time">00:00:00</span>
                    <span class="log-message">System initialized successfully</span>
                </div>
            </div>
        </aside>
    </div>

    <!-- Modal for displaying messages -->
    <div id="message-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Notification</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <p id="modal-message"></p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary modal-ok">OK</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
